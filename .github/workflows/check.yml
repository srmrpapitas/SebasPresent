# SebasPresent — Check automático en cada push
#
# Qué hace: cada vez que subes código a GitHub, este workflow:
#   1. Descarga tu repo en un servidor de GitHub
#   2. Instala Node.js
#   3. Corre `npm run check`  → verifica sintaxis de los 13 .js
#   4. Corre `npm run audit`  → verifica hooks documentados, TODOs, console.log
#
# Si TODO pasa: aparece un ✅ verde al lado de tu commit en GitHub.
# Si algo falla: aparece un ❌ rojo. NO bloquea deploy de Cloudflare Pages
# (es solo aviso). Para ver detalles del error, tocas el ❌ → "Details".
#
# Tarda ~30 segundos por commit. Gratis hasta 2000 minutos/mes (suficiente
# para cientos de commits).

name: Check & Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-and-audit:
    runs-on: ubuntu-latest
    steps:
      # 1. Descargar el código del repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Instalar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Verificar sintaxis de todos los .js del cliente y servidor.
      # Si algún archivo tiene un punto y coma de más o un paréntesis sin
      # cerrar, esto FALLA y se ve un ❌ rojo en GitHub.
      - name: Check syntax
        run: npm run check

      # 4. Verificar hooks globales documentados en INVARIANTS.md,
      # TODOs pendientes, y console.log residuales.
      # Solo audit:globals puede fallar (los otros 2 solo informan).
      - name: Audit
        run: npm run audit
