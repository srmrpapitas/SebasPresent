name = "sebaspresent"
main = "server/worker.js"
compatibility_date = "2025-01-01"

# CORS — allow your Pages domain to call the Worker
# In dev, allow localhost. Add your real Pages URL after first deploy.
[vars]
ALLOWED_ORIGINS = "http://localhost:8080,http://127.0.0.1:8080,https://sebaspresent.pages.dev"

[[d1_databases]]
binding = "DB"
database_name = "sebaspresent-db"
database_id = "bd9c29c7-493d-4ece-ac6e-6f97d49558b9"

# JWT_SECRET is set as a secret via:
#   npx wrangler secret put JWT_SECRET
# Locally it's read from .dev.vars

[triggers]
crons = ["* * * * *"]
