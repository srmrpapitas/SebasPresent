<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1410" />
  <title>SebasPresent</title>

  <!-- Distinctive fonts for OSRS aesthetic -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Audio: login theme. autoplay blocked by browsers until first user interaction. -->
  <audio id="loginMusic" src="assets/music/login_theme.mp3" loop preload="auto"></audio>

  <!-- ========== SPLASH (pre-login click prompt to unlock audio) ========== -->
  <section id="splash" class="screen splash-screen">
    <div class="splash-bg"></div>
    <div class="splash-content">
      <h1 class="brand-title">SebasPresent</h1>
      <p class="brand-tagline">Un mundo te espera</p>
      <button id="enterBtn" class="osrs-btn osrs-btn-primary splash-enter">Entrar al reino</button>
    </div>
    <div class="splash-fog"></div>
  </section>

  <!-- ========== LOGIN ========== -->
  <section id="loginScreen" class="screen login-screen hidden">
    <div class="login-bg"></div>

    <div class="parchment-frame login-frame">
      <div class="parchment-corner tl"></div>
      <div class="parchment-corner tr"></div>
      <div class="parchment-corner bl"></div>
      <div class="parchment-corner br"></div>

      <div class="parchment-content">
        <h2 class="osrs-heading">Existing User</h2>

        <form id="loginForm" class="osrs-form" autocomplete="off" novalidate>
          <label class="osrs-label">
            <span class="lbl-text">Login Name:</span>
            <input type="text" id="loginUsername" class="osrs-input" maxlength="16" autocapitalize="off" autocomplete="username" required />
          </label>
          <label class="osrs-label">
            <span class="lbl-text">Password:</span>
            <input type="password" id="loginPassword" class="osrs-input" maxlength="64" autocomplete="current-password" required />
          </label>

          <div class="osrs-form-actions">
            <button type="submit" class="osrs-btn osrs-btn-primary">Login</button>
            <button type="button" class="osrs-btn osrs-btn-ghost" id="showRegisterBtn">Crear cuenta nueva</button>
          </div>

          <p class="osrs-error" id="loginError"></p>
        </form>

        <p class="osrs-footnote">El reino te recordará.</p>
      </div>
    </div>

    <div class="version-tag">v0.2 · Slice 2</div>
  </section>

  <!-- ========== REGISTER ========== -->
  <section id="registerScreen" class="screen login-screen hidden">
    <div class="login-bg"></div>

    <div class="parchment-frame login-frame">
      <div class="parchment-corner tl"></div>
      <div class="parchment-corner tr"></div>
      <div class="parchment-corner bl"></div>
      <div class="parchment-corner br"></div>

      <div class="parchment-content">
        <h2 class="osrs-heading">New User</h2>

        <form id="registerForm" class="osrs-form" autocomplete="off" novalidate>
          <label class="osrs-label">
            <span class="lbl-text">Login Name:</span>
            <input type="text" id="regUsername" class="osrs-input" maxlength="16" autocapitalize="off" autocomplete="username" required />
            <span class="lbl-hint">3–16 caracteres. Letras, números y _</span>
          </label>
          <label class="osrs-label">
            <span class="lbl-text">Password:</span>
            <input type="password" id="regPassword" class="osrs-input" maxlength="64" autocomplete="new-password" required />
            <span class="lbl-hint">Mínimo 6 caracteres.</span>
          </label>
          <label class="osrs-label">
            <span class="lbl-text">Confirm:</span>
            <input type="password" id="regPasswordConfirm" class="osrs-input" maxlength="64" autocomplete="new-password" required />
          </label>

          <div class="osrs-form-actions">
            <button type="submit" class="osrs-btn osrs-btn-primary">Crear cuenta</button>
            <button type="button" class="osrs-btn osrs-btn-ghost" id="showLoginBtn">Ya tengo cuenta</button>
          </div>

          <p class="osrs-error" id="registerError"></p>
        </form>
      </div>
    </div>
  </section>

  <!-- ========== WORLD (3D scene) ========== -->
  <section id="worldScreen" class="screen world-screen hidden">
    <canvas id="worldCanvas"></canvas>

    <!-- Floating name tag positioned per frame by JS -->
    <div id="playerNameTag" class="player-name-tag hidden"></div>

    <!-- HUD overlay: chrome on top of the 3D scene -->
    <div class="world-hud">
      <div class="world-hud-top">
        <button id="worldLogoutBtn" class="world-hud-btn">↩ Salir</button>
        <div class="world-hud-pill">SebasPresent · alpha</div>
      </div>

      <div class="world-hint" id="worldHint">Toca el suelo para moverte</div>

      <!-- Virtual joystick (hidden on desktop via CSS) -->
      <div id="joystick" class="joystick">
        <div id="joystickKnob" class="joystick-knob"></div>
      </div>
    </div>

    <!-- Loading veil shown while Three.js loads -->
    <div id="worldLoading" class="world-loading hidden">
      <div class="loading-spinner"></div>
      <div class="loading-text">Cargando el reino…</div>
    </div>
  </section>

  <!-- ========== LOADING OVERLAY (global, for auth requests) ========== -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-spinner"></div>
    <div class="loading-text">Conectando…</div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
