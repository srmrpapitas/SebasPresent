<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1410" />
  <title>SebasPresent</title>

  <!-- Distinctive fonts for OSRS aesthetic -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />

  <style>
    /* ============ OSRS-style HUD (Slice 3 final) ============ */

    /* Minimap container — top right, OSRS style */
    .osrs-minimap-wrap {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 8px);
      right: 8px;
      z-index: 14;
      display: flex;
      align-items: flex-start;
      gap: 4px;
      pointer-events: none;
    }

    /* Stats column to the LEFT of the minimap (HP, Prayer, Run) */
    .osrs-stats-column {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-top: 18px; /* aligns roughly with N compass */
      pointer-events: auto;
    }

    .osrs-stat {
      width: 38px;
      height: 38px;
      background: rgba(20, 14, 8, 0.92);
      border: 1.5px solid #5a4a30;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .osrs-stat:active { transform: scale(0.92); }

    .osrs-stat-icon {
      font-size: 17px;
      line-height: 1;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.7));
    }
    .osrs-stat-value {
      font-family: 'IM Fell English', serif;
      font-size: 10px;
      font-weight: bold;
      color: #ffff00;
      line-height: 1;
      margin-top: 2px;
      text-shadow: 1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000;
    }

    /* HP stat: red heart */
    .osrs-stat.hp .osrs-stat-icon { color: #d93030; }
    /* Prayer: blue */
    .osrs-stat.prayer .osrs-stat-icon { color: #6090e0; }
    /* Run: yellow boot, dimmer when off */
    .osrs-stat.run { transition: all 0.2s; }
    .osrs-stat.run.active {
      border-color: #ffc830;
      box-shadow: 0 0 8px rgba(255, 200, 48, 0.6), 0 2px 6px rgba(0,0,0,0.5);
    }
    .osrs-stat.run.active .osrs-stat-icon { filter: drop-shadow(0 0 4px #ffd060); }
    .osrs-stat.run.active .osrs-stat-value { color: #ffd060; }

    /* Minimap canvas */
    #worldMinimap {
      pointer-events: auto;
      cursor: pointer;
    }

    /* ============ FULL MAP MODAL (OSRS world map style) ============ */
    .osrs-fullmap-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .osrs-fullmap-overlay.visible {
      display: flex;
    }

    .osrs-fullmap-frame {
      position: relative;
      background: rgba(20, 14, 8, 0.97);
      border: 3px solid #c8a043;
      border-radius: 6px;
      box-shadow: 0 0 60px rgba(200, 160, 67, 0.4), 0 12px 40px rgba(0,0,0,0.8);
      padding: 12px;
      max-width: 95vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    .osrs-fullmap-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 6px 10px 6px;
      border-bottom: 1px solid rgba(200, 160, 67, 0.3);
      margin-bottom: 8px;
    }
    .osrs-fullmap-title {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 18px;
      color: #e8c560;
      letter-spacing: 0.05em;
      text-shadow: 0 2px 4px rgba(0,0,0,0.9);
    }
    .osrs-fullmap-close {
      width: 32px;
      height: 32px;
      background: rgba(60, 30, 20, 0.95);
      border: 2px solid #c8a043;
      color: #e8c560;
      font-size: 18px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .osrs-fullmap-close:active {
      transform: scale(0.9);
      background: rgba(120, 60, 40, 0.95);
    }

    #worldFullMap {
      background: rgba(40, 30, 20, 0.7);
      border-radius: 4px;
      border: 1px solid rgba(200, 160, 67, 0.4);
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    .osrs-fullmap-footer {
      padding-top: 8px;
      color: rgba(200, 160, 67, 0.7);
      font-family: 'IM Fell English', serif;
      font-size: 11px;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- Audio: login theme. autoplay blocked by browsers until first user interaction. -->
  <audio id="loginMusic" src="assets/music/login_theme.mp3" loop preload="auto"></audio>

  <!-- ========== SPLASH (pre-login click prompt to unlock audio) ========== -->
  <section id="splash" class="screen splash-screen">
    <div class="splash-bg"></div>
    <div class="splash-content">
      <h1 class="brand-title">SebasPresent</h1>
      <p class="brand-tagline">Un mundo te espera</p>
      <button id="enterBtn" class="osrs-btn osrs-btn-primary splash-enter">Entrar al reino</button>
    </div>
    <div class="splash-fog"></div>
  </section>

  <!-- ========== LOGIN ========== -->
  <section id="loginScreen" class="screen login-screen hidden">
    <div class="login-bg"></div>

    <div class="parchment-frame login-frame">
      <div class="parchment-corner tl"></div>
      <div class="parchment-corner tr"></div>
      <div class="parchment-corner bl"></div>
      <div class="parchment-corner br"></div>

      <div class="parchment-content">
        <h2 class="osrs-heading">Existing User</h2>

        <form id="loginForm" class="osrs-form" autocomplete="off" novalidate>
          <label class="osrs-label">
            <span class="lbl-text">Login Name:</span>
            <input type="text" id="loginUsername" class="osrs-input" maxlength="16" autocapitalize="off" autocomplete="username" required />
          </label>
          <label class="osrs-label">
            <span class="lbl-text">Password:</span>
            <input type="password" id="loginPassword" class="osrs-input" maxlength="64" autocomplete="current-password" required />
          </label>

          <div class="osrs-form-actions">
            <button type="submit" class="osrs-btn osrs-btn-primary">Login</button>
            <button type="button" class="osrs-btn osrs-btn-ghost" id="showRegisterBtn">Crear cuenta nueva</button>
          </div>

          <p class="osrs-error" id="loginError"></p>
        </form>

        <p class="osrs-footnote">El reino te recordará.</p>
      </div>
    </div>

    <div class="version-tag">v0.3 · Slice 3</div>
  </section>

  <!-- ========== REGISTER ========== -->
  <section id="registerScreen" class="screen login-screen hidden">
    <div class="login-bg"></div>

    <div class="parchment-frame login-frame">
      <div class="parchment-corner tl"></div>
      <div class="parchment-corner tr"></div>
      <div class="parchment-corner bl"></div>
      <div class="parchment-corner br"></div>

      <div class="parchment-content">
        <h2 class="osrs-heading">New User</h2>

        <form id="registerForm" class="osrs-form" autocomplete="off" novalidate>
          <label class="osrs-label">
            <span class="lbl-text">Login Name:</span>
            <input type="text" id="regUsername" class="osrs-input" maxlength="16" autocapitalize="off" autocomplete="username" required />
            <span class="lbl-hint">3–16 caracteres. Letras, números y _</span>
          </label>
          <label class="osrs-label">
            <span class="lbl-text">Password:</span>
            <input type="password" id="regPassword" class="osrs-input" maxlength="64" autocomplete="new-password" required />
            <span class="lbl-hint">Mínimo 6 caracteres.</span>
          </label>
          <label class="osrs-label">
            <span class="lbl-text">Confirm:</span>
            <input type="password" id="regPasswordConfirm" class="osrs-input" maxlength="64" autocomplete="new-password" required />
          </label>

          <div class="osrs-form-actions">
            <button type="submit" class="osrs-btn osrs-btn-primary">Crear cuenta</button>
            <button type="button" class="osrs-btn osrs-btn-ghost" id="showLoginBtn">Ya tengo cuenta</button>
          </div>

          <p class="osrs-error" id="registerError"></p>
        </form>
      </div>
    </div>
  </section>

  <!-- ========== WORLD (3D scene) ========== -->
  <section id="worldScreen" class="screen world-screen hidden">
    <canvas id="worldCanvas"></canvas>

    <!-- Floating name tag positioned per frame by JS -->
    <div id="playerNameTag" class="player-name-tag hidden"></div>

    <!-- HUD overlay: chrome on top of the 3D scene -->
    <div class="world-hud">
      <div class="world-hud-top">
        <button id="worldLogoutBtn" class="world-hud-btn">↩ Salir</button>
        <div class="world-hud-pill">SebasPresent · alpha</div>
      </div>

      <div class="world-hint" id="worldHint">Toca el suelo para moverte</div>

      <!-- Virtual joystick (hidden on desktop via CSS) -->
      <div id="joystick" class="joystick">
        <div id="joystickKnob" class="joystick-knob"></div>
      </div>
    </div>

    <!-- ========== OSRS-style minimap (top right) ========== -->
    <div class="osrs-minimap-wrap">
      <!-- Stats column to the left of minimap -->
      <div class="osrs-stats-column">
        <div class="osrs-stat hp" id="hudStatHp">
          <div class="osrs-stat-icon">❤</div>
          <div class="osrs-stat-value" id="hudHpValue">10</div>
        </div>
        <div class="osrs-stat prayer" id="hudStatPrayer">
          <div class="osrs-stat-icon">✦</div>
          <div class="osrs-stat-value" id="hudPrayerValue">10</div>
        </div>
        <div class="osrs-stat run" id="hudStatRun">
          <div class="osrs-stat-icon">🥾</div>
          <div class="osrs-stat-value" id="hudRunValue">100</div>
        </div>
      </div>
      <!-- Minimap canvas is created/sized by world.js -->
      <canvas id="worldMinimap" width="130" height="130"></canvas>
    </div>

    <!-- ========== Full map modal (OSRS world map style) ========== -->
    <div class="osrs-fullmap-overlay" id="fullMapOverlay">
      <div class="osrs-fullmap-frame">
        <div class="osrs-fullmap-header">
          <div class="osrs-fullmap-title">Mapa del Reino</div>
          <button class="osrs-fullmap-close" id="fullMapClose">✕</button>
        </div>
        <canvas id="worldFullMap" width="640" height="640"></canvas>
        <div class="osrs-fullmap-footer">Tu posición aparece como un punto blanco · Cierra con ✕</div>
      </div>
    </div>

    <!-- Loading veil shown while Three.js loads -->
    <div id="worldLoading" class="world-loading hidden">
      <div class="loading-spinner"></div>
      <div class="loading-text">Cargando el reino…</div>
    </div>
  </section>

  <!-- ========== LOADING OVERLAY (global, for auth requests) ========== -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-spinner"></div>
    <div class="loading-text">Conectando…</div>
  </div>

 <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
